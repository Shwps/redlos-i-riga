<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redlös i Riga — Poängjakt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Limelight&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #ffdd00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #000;
      color: var(--accent);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5;
      padding: 2rem 1rem 4rem;
    }
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    h1 {
      font-family: "Limelight", cursive;
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      margin: 0;
      letter-spacing: 1px;
    }
    .subheader {
      font-size: clamp(1.1rem, 4vw, 1.6rem);
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.85;
      margin-top: 0.4rem;
    }
    main {
      max-width: 640px;
      margin: 0 auto;
    }
    h2 {
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-bottom: 1px solid rgba(255, 221, 0, 0.35);
      padding-bottom: 0.4rem;
      margin: 2rem 0 1rem;
    }
    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .task-list li {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.7rem 0.6rem;
      border-bottom: 1px solid rgba(255, 221, 0, 0.15);
    }
    .task-list li .label {
      flex: 1;
    }
    .task-list li.done .label {
      opacity: 0.5;
      text-decoration: line-through;
    }
    input[type="checkbox"] {
      width: 1.5rem;
      height: 1.5rem;
      accent-color: var(--accent);
      flex-shrink: 0;
      cursor: pointer;
    }
    input[type="number"] {
      width: 4.5rem;
      background: #000;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 0.4rem;
      font-size: 1rem;
      text-align: center;
      flex-shrink: 0;
    }
    .divider {
      border: none;
      border-top: 2px solid var(--accent);
      margin: 3.5rem 0 2rem;
      opacity: 0.6;
    }
    .rules-title {
      font-family: "Limelight", cursive;
      font-size: clamp(1.8rem, 6vw, 2.6rem);
      text-align: center;
      margin: 0 0 1.5rem;
    }
    .rules h3 {
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-bottom: 1px solid rgba(255, 221, 0, 0.35);
      padding-bottom: 0.3rem;
      margin: 2rem 0 0.8rem;
    }
    .rules h4 {
      font-size: 1rem;
      letter-spacing: 1px;
      margin: 1.2rem 0 0.5rem;
    }
    .rules ul {
      list-style: disc;
      padding-left: 1.4rem;
    }
    .rules li {
      padding: 0.25rem 0;
    }
    .error {
      opacity: 0.7;
      font-style: italic;
    }
  </style>
</head>
<body>
  <header>
    <h1>Redlös i Riga</h1>
    <div class="subheader">Poängjakt</div>
  </header>

  <main>
    <h2>Utmaningar</h2>
    <ul id="check-list" class="task-list"></ul>

    <h2>Räknare</h2>
    <ul id="num-list" class="task-list"></ul>

    <hr class="divider">

    <h2 class="rules-title">Lekregler</h2>
    <div class="rules" id="rules"></div>
  </main>

  <script>
    const STORAGE_KEY = "poangjakt-state";
    const state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    const save = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

    // Fetch a text file; returns "" on failure.
    async function fetchText(path) {
      try {
        const res = await fetch(path, { cache: "no-store" });
        if (!res.ok) throw new Error(res.status);
        return await res.text();
      } catch (e) {
        console.error("Kunde inte ladda " + path, e);
        return null;
      }
    }

    // Split into trimmed, non-empty lines.
    const lines = (text) =>
      text.split("\n").map((l) => l.trim()).filter((l) => l.length);

    function renderTaskList(containerId, text, type, keyPrefix) {
      const ul = document.getElementById(containerId);
      ul.innerHTML = "";
      if (text == null) {
        ul.innerHTML = '<li class="error">Kunde inte ladda listan.</li>';
        return;
      }
      lines(text).forEach((item) => {
        const key = keyPrefix + ":" + item; // keyed by text → reorder-safe
        const li = document.createElement("li");

        const label = document.createElement("span");
        label.className = "label";
        label.textContent = item;

        let input;
        if (type === "check") {
          input = document.createElement("input");
          input.type = "checkbox";
          input.checked = !!state[key];
          if (input.checked) li.classList.add("done");
          input.addEventListener("change", () => {
            state[key] = input.checked;
            li.classList.toggle("done", input.checked);
            save();
          });
        } else {
          input = document.createElement("input");
          input.type = "number";
          input.min = "0";
          input.value = state[key] != null ? state[key] : "";
          input.addEventListener("input", () => {
            state[key] = input.value;
            save();
          });
        }

        li.append(label, input);
        ul.append(li);
      });
    }

    // Minimal markdown renderer: supports # / ## / ### headers and - bullets.
    function renderRules(text) {
      const container = document.getElementById("rules");
      container.innerHTML = "";
      if (text == null) {
        container.innerHTML = '<p class="error">Kunde inte ladda lekreglerna.</p>';
        return;
      }
      let currentList = null;
      const closeList = () => { currentList = null; };

      text.split("\n").forEach((raw) => {
        const line = raw.trim();
        if (!line) return closeList();

        const h = line.match(/^(#{1,3})\s+(.*)$/);
        if (h) {
          closeList();
          const level = h[1].length + 2; // # -> h3, ## -> h4, ### -> h5
          const el = document.createElement("h" + Math.min(level, 6));
          el.textContent = h[2];
          container.append(el);
          return;
        }

        const b = line.match(/^[-*+]\s+(.*)$/);
        if (b) {
          if (!currentList) {
            currentList = document.createElement("ul");
            container.append(currentList);
          }
          const li = document.createElement("li");
          li.textContent = b[1];
          currentList.append(li);
          return;
        }

        // plain paragraph
        closeList();
        const p = document.createElement("p");
        p.textContent = line;
        container.append(p);
      });
    }

    (async () => {
      const [check, num, rules] = await Promise.all([
        fetchText("poangjakt-check.txt"),
        fetchText("poangjakt-num.txt"),
        fetchText("lek-regler.md"),
      ]);
      renderTaskList("check-list", check, "check", "check");
      renderTaskList("num-list", num, "num", "num");
      renderRules(rules);
    })();
  </script>
</body>
</html>
